name = "backend"
main = "build/index.js"
compatibility_date = "2026-06-02"

[build]
command = "cargo install -q \"worker-build@^0.8\" && worker-build --release"

[vars]
ENV="prod"

[env.dev.vars]
ENV="dev"

[[routes]]
pattern="api.bot.leifbarton.dev"
custom_domain=true

[[d1_databases]]
binding="DB"
database_name="bbcr"
database_id="03f490ed-bd15-4d0c-ab2b-f25ef7bc895b"
remote=true